<!DOCTYPE html>

  <title>Thiệp tốt nghiệp 💌</title>

</head>

<body>

<div class="scene">

  <!-- phong bì -->
  <div class="envelope" id="envelope">
    <div class="flap"></div>
    <div class="body"></div>

      <p>Chúc bạn luôn thành công và rực rỡ trong tương lai ✨</p>
      <button onclick="openCard()">Mở thiệp 💌</button>
    </div>
  </div>

</div>

<!-- pháo hoa -->
<canvas id="fireworks"></canvas>

<!-- nhạc -->
<audio id="music" src="music.mp3" loop></audio>

<script src="script.js"></script>
</body>
</html>
